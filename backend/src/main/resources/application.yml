server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: loan-payment-backend

  profiles:
    active: h2

  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      issuer: loan-payment-system
      expiration-minutes: 120
