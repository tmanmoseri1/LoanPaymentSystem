apiVersion: apps/v1
kind: Deployment
metadata:
  name: loanpay-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loanpay-backend
  template:
    metadata:
      labels:
        app: loanpay-backend
    spec:
      containers:
        - name: backend
          image: registry/loanpay-backend:1.0.0
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "postgres"
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432/loans"
            - name: DB_USER
              value: "loans"
            - name: DB_PASSWORD
              value: "loans"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loanpay-secrets
                  key: jwtSecret
---
apiVersion: v1
kind: Service
metadata:
  name: loanpay-backend
spec:
  selector:
    app: loanpay-backend
  ports:
    - port: 8081
      targetPort: 8081
