services:
  postgres:
    image: postgres:16-alpine
    container_name: loan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: loans
      POSTGRES_PASSWORD: loans
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loans -d loans"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: loan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: loan-rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: loan-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loans
      SPRING_DATASOURCE_USERNAME: loans
      SPRING_DATASOURCE_PASSWORD: loans
      REDIS_HOST: redis
      RABBIT_HOST: rabbitmq
      JWT_SECRET: b7e3f1c9a6d4e2f8b5c1a9d7e3f6b2c8a4d1e9f7c6b3a5d8f2e1c9b7a4d6f3
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: loan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  pgdata: